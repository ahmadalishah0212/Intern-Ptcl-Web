<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PTCL Login</title>

    <link rel="icon" type="image/png" href="../images/ptcl-logo.png">

    <link rel="stylesheet" href="./login.css">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

  

    <div class="left">

        <img src="../images/bg.jpg">

    </div>

    

    <div class="right">

        <div class="logo">
    <img src="../images/ptcl-logo.png" alt="Company Logo">
</div>

        <h2>Welcome back!</h2>

        <p> Sign in to start managing your projects.</p>

        <div class="tabs">

            <button class="active">Login</button>

            <button onclick="goRegister()">Register</button>

        </div>

        <form id="loginForm">

            <input
            type="email"
            id="email"
            placeholder="Email Address"
            required>

            <div class="passwordBox">

                <input
                type="password"
                id="password"
                placeholder="Password"
                required>

                <i
                class="fa-solid fa-eye"
                id="eye"></i>

            </div>

            <a href="#" class="forgot">Forgot Password?</a>

            <button class="loginBtn">

                Sign In

            </button>

        </form>

        <p class="bottom">

            Don't have an account?

            <a href="../Register/register.html">Sign Up</a>

        </p>

        <div class="line">

            <span>Or Continue With</span>

        </div>

        <div class="social">

            <i class="fa-brands fa-google"></i>

            <i class="fa-brands fa-github"></i>

            <i class="fa-brands fa-facebook"></i>

        </div>

    </div>

</div>






<div id="popup">

    <div class="popupContent">

        <i id="popupIcon" class="fa-solid fa-circle-check"></i>

        <h3 id="popupTitle">Success</h3>

        <p id="popupMessage"></p>

        <button id="popupButton" onclick="closePopup()">
            OK
        </button>

    </div>

</div>

<script src="login.js"></script>

</body>

</html>
